services:
  chroma:
    image: chromadb/chroma:0.6.1
    volumes:
      - chroma_db:/chroma/chroma
    restart: unless-stopped

  ai-agent:
    build:
      context: ./ai-agent-ts
      dockerfile: Dockerfile
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LANGCHAIN_TRACING_V2=${LANGCHAIN_TRACING_V2:-true}
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY}
      - LANGCHAIN_PROJECT=${LANGCHAIN_PROJECT:-nutriguide-ai-prototype}
      - CHROMA_URL=http://chroma:8000
    depends_on:
      - chroma
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - PORT=3001
      - AGENT_URL=http://ai-agent:8000
    depends_on:
      - ai-agent
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  chroma_db:
