name: Build and Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/README.md'
      - '.env.example'
      - '.gitignore'
      - '.dockerignore'
      - 'docker-compose.yml'
      - 'backend/scripts/dummy-data*.sql'

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push frontend
        run: |
          docker build -t $ECR_REGISTRY/nutriguide-frontend:$IMAGE_TAG ./frontend
          docker push $ECR_REGISTRY/nutriguide-frontend:$IMAGE_TAG

      - name: Build and push backend
        run: |
          docker build -t $ECR_REGISTRY/nutriguide-backend:$IMAGE_TAG ./backend
          docker push $ECR_REGISTRY/nutriguide-backend:$IMAGE_TAG

      - name: Build and push ai-agent
        run: |
          docker build -t $ECR_REGISTRY/nutriguide-ai-agent:$IMAGE_TAG ./ai-agent-ts
          docker push $ECR_REGISTRY/nutriguide-ai-agent:$IMAGE_TAG

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      AGENT_PORT: ${{ vars.AGENT_PORT }}
      LANGSMITH_TRACING_V2: ${{ vars.LANGSMITH_TRACING_V2 }}
      LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
      LANGSMITH_PROJECT: ${{ vars.LANGSMITH_PROJECT }}
      PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
      PINECONE_INDEX: ${{ vars.PINECONE_INDEX }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
      USDA_FDC_API_KEY: ${{ secrets.USDA_FDC_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: paths
        with:
          filters: |
            knowledge:
              - 'ai-agent-ts/knowledge/**'

      - name: Index knowledge to Pinecone
        if: steps.paths.outputs.knowledge == 'true'
        run: |
          cd ai-agent-ts
          npm ci
          npm run index

      - name: Get runner public IP
        id: ip
        run: |
          RUNNER_IP=$(curl -sf https://checkip.amazonaws.com || curl -sf https://api.ipify.org)
          echo "ipv4=$RUNNER_IP" >> $GITHUB_OUTPUT
          echo "Runner IP: $RUNNER_IP"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Add runner IP to security group
        run: |
          aws ec2 authorize-security-group-ingress \
            --group-id ${{ vars.SECURITY_GROUP_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr ${{ steps.ip.outputs.ipv4 }}/32

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key.pem
          chmod 600 ~/.ssh/deploy_key.pem
          ssh-keyscan -H ${{ vars.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Copy docker-compose.prod.yml to EC2
        run: |
          scp -i ~/.ssh/deploy_key.pem -o StrictHostKeyChecking=no \
            docker-compose.prod.yml ubuntu@${{ vars.EC2_HOST }}:/home/ubuntu/nutriguide/

      - name: Deploy on EC2
        run: |
          ssh -i ~/.ssh/deploy_key.pem -o StrictHostKeyChecking=no ubuntu@${{ vars.EC2_HOST }} \
            "cd /home/ubuntu/nutriguide && \
            echo 'OPENAI_API_KEY=$OPENAI_API_KEY' > .env && \
            echo 'AGENT_PORT=$AGENT_PORT' >> .env && \
            echo 'LANGSMITH_TRACING_V2=$LANGSMITH_TRACING_V2' >> .env && \
            echo 'LANGSMITH_API_KEY=$LANGSMITH_API_KEY' >> .env && \
            echo 'LANGSMITH_PROJECT=$LANGSMITH_PROJECT' >> .env && \
            echo 'PINECONE_API_KEY=$PINECONE_API_KEY' >> .env && \
            echo 'PINECONE_INDEX=$PINECONE_INDEX' >> .env && \
            echo 'DATABASE_URL=$DATABASE_URL' >> .env && \
            echo 'INTERNAL_API_KEY=$INTERNAL_API_KEY' >> .env && \
            echo 'USDA_FDC_API_KEY=$USDA_FDC_API_KEY' >> .env && \
            echo 'ECR_REGISTRY=$ECR_REGISTRY' >> .env && \
            echo 'IMAGE_TAG=$IMAGE_TAG' >> .env && \
            aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY && \
            docker compose -f docker-compose.prod.yml pull && \
            docker compose -f docker-compose.prod.yml up -d"

      - name: Remove runner IP from security group
        if: always() && steps.ip.outputs.ipv4 != ''
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id ${{ vars.SECURITY_GROUP_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr ${{ steps.ip.outputs.ipv4 }}/32 || true
