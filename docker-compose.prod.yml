services:
  ai-agent:
    image: ${ECR_REGISTRY}/nutriguide-ai-agent:${IMAGE_TAG}
    environment:
      - AGENT_PORT=${AGENT_PORT}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LANGSMITH_TRACING_V2=${LANGSMITH_TRACING_V2}
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY}
      - LANGSMITH_PROJECT=${LANGSMITH_PROJECT}
      - PINECONE_API_KEY=${PINECONE_API_KEY}
      - PINECONE_INDEX=${PINECONE_INDEX}
      - BACKEND_URL=http://backend:3001
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
    restart: unless-stopped

  backend:
    image: ${ECR_REGISTRY}/nutriguide-backend:${IMAGE_TAG}
    environment:
      - PORT=3001
      - AGENT_URL=http://ai-agent:8000
      - DATABASE_URL=${DATABASE_URL}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
    depends_on:
      - ai-agent
    restart: unless-stopped

  frontend:
    image: ${ECR_REGISTRY}/nutriguide-frontend:${IMAGE_TAG}
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
